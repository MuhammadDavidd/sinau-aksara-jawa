kind = "web"
previewPath = "/"
title = "Aksara Jawa — Belajar dari Nol"
version = "1.0.0"
id = "artifacts/aksara-jawa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22368

[services.development]
run = "pnpm --filter @workspace/aksara-jawa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aksara-jawa", "run", "build" ]
publicDir = "artifacts/aksara-jawa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22368"
BASE_PATH = "/"
